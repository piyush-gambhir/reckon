<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>reckon · incidents</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
    --ok: #3fb950; --warn: #d29922; --bad: #f85149;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--fg);
         font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

  /* sidebar */
  #side { width: 340px; min-width: 260px; border-right: 1px solid var(--border);
          display: flex; flex-direction: column; background: var(--panel); }
  #side header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  #side h1 { margin: 0 0 8px; font-size: 15px; }
  #side h1 .n { color: var(--dim); font-weight: normal; }
  #q { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
       background: var(--bg); color: var(--fg); outline: none; }
  #list { overflow-y: auto; flex: 1; }
  .item { padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .item:hover { background: #1c2230; }
  .item.active { background: #1c2a45; border-left: 3px solid var(--accent); padding-left: 13px; }
  .item .date { font-family: var(--mono); font-size: 12px; color: var(--accent); }
  .item .title { font-size: 13px; margin: 2px 0; }
  .item .meta { font-size: 11px; color: var(--dim); display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { padding: 0 6px; border-radius: 8px; border: 1px solid var(--border); }
  .badge.sup { color: var(--warn); border-color: var(--warn); }
  .badge.legacy { color: var(--dim); }
  .badge.learn { color: var(--ok); }

  /* main */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #tabs { display: flex; gap: 4px; padding: 10px 18px 0; border-bottom: 1px solid var(--border); }
  #tabs button { background: none; border: 1px solid transparent; border-bottom: none; color: var(--dim);
                 padding: 6px 14px; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 13px; }
  #tabs button.active { color: var(--fg); border-color: var(--border); background: var(--bg); }
  #tabs button:disabled { opacity: .35; cursor: default; }
  #content { overflow-y: auto; flex: 1; padding: 22px 32px 64px; }
  #empty { color: var(--dim); padding: 40px; text-align: center; }

  /* markdown */
  #content h1 { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  #content h2 { font-size: 18px; margin-top: 28px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
  #content h3 { font-size: 15px; margin-top: 22px; }
  #content a { color: var(--accent); }
  #content code { font-family: var(--mono); font-size: 12.5px; background: #1f2733; padding: 1px 5px; border-radius: 4px; }
  #content pre { background: #10151d; border: 1px solid var(--border); border-radius: 8px;
                 padding: 12px 14px; overflow-x: auto; }
  #content pre code { background: none; padding: 0; }
  #content table { border-collapse: collapse; margin: 12px 0; font-size: 13px; display: block; overflow-x: auto; }
  #content th, #content td { border: 1px solid var(--border); padding: 5px 10px; text-align: left; }
  #content th { background: #1c2230; }
  #content blockquote { border-left: 3px solid var(--warn); margin: 12px 0; padding: 4px 14px; color: var(--dim); background: #161b2266; }
  .evfile { display: block; margin: 4px 0; font-family: var(--mono); font-size: 13px;
            color: var(--accent); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; text-align: left; }
</style>
</head>
<body>
  <nav id="side">
    <header>
      <h1>reckon incidents <span class="n" id="count"></span></h1>
      <input id="q" type="search" placeholder="filter… (service, slug, trigger)">
    </header>
    <div id="list"></div>
  </nav>
  <section id="main">
    <div id="tabs" hidden>
      <button data-tab="rca" class="active">RCA</button>
      <button data-tab="alert">Alert</button>
      <button data-tab="learnings">Learnings</button>
      <button data-tab="evidence">Evidence</button>
    </div>
    <div id="content"><div id="empty">Select an incident ←<br><br>
      <small>Serving your local <code>incidents/</code> corpus. Nothing leaves this machine.</small></div>
    </div>
  </section>

<script type="module">
// Markdown rendering: prefer marked (CDN); fall back to <pre> when offline.
let renderMd = (md) => { const pre = document.createElement('pre'); pre.textContent = md; return pre.outerHTML; };
try {
  const { marked } = await import('https://cdn.jsdelivr.net/npm/marked@12/lib/marked.esm.js');
  marked.setOptions({ gfm: true, breaks: false });
  renderMd = (md) => marked.parse(md);
} catch { /* offline — plain-text fallback active */ }

const $ = (s) => document.querySelector(s);
const esc = (s) => s.replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let incidents = [], current = null, currentData = null, tab = 'rca';

async function load() {
  incidents = await (await fetch('/api/incidents')).json();
  $('#count').textContent = `(${incidents.length})`;
  renderList();
}

function renderList() {
  const q = $('#q').value.toLowerCase();
  const list = $('#list'); list.innerHTML = '';
  for (const inc of incidents) {
    const hay = `${inc.id} ${inc.title} ${inc.trigger || ''} ${inc.window || ''}`.toLowerCase();
    if (q && !hay.includes(q)) continue;
    const div = document.createElement('div');
    div.className = 'item' + (current === inc.id ? ' active' : '');
    div.innerHTML = `
      <div class="date">${esc(inc.date || '????-??-??')}</div>
      <div class="title">${esc(inc.title)}</div>
      <div class="meta">
        ${inc.superseded ? '<span class="badge sup">superseded</span>' : ''}
        ${inc.kind === 'legacy' ? '<span class="badge legacy">legacy root file</span>' : ''}
        ${inc.hasLearnings ? '<span class="badge learn">learnings</span>' : ''}
        ${inc.evidenceCount ? `<span class="badge">${inc.evidenceCount} evidence</span>` : ''}
      </div>`;
    div.onclick = () => open(inc.id);
    list.appendChild(div);
  }
}

async function open(id) {
  current = id; tab = 'rca';
  currentData = await (await fetch(`/api/incident?id=${encodeURIComponent(id)}`)).json();
  $('#tabs').hidden = false;
  for (const b of document.querySelectorAll('#tabs button')) {
    b.classList.toggle('active', b.dataset.tab === 'rca');
    b.disabled = (b.dataset.tab === 'alert' && !currentData.alert)
              || (b.dataset.tab === 'learnings' && !currentData.learnings)
              || (b.dataset.tab === 'evidence' && !currentData.evidence.length);
  }
  renderList(); renderTab();
}

function renderTab() {
  const c = $('#content');
  if (tab === 'rca')        c.innerHTML = renderMd(currentData.rca || '');
  else if (tab === 'alert') c.innerHTML = `<h1>alert.txt</h1><pre>${esc(currentData.alert || '')}</pre>`;
  else if (tab === 'learnings') c.innerHTML = renderMd(currentData.learnings || '');
  else if (tab === 'evidence') {
    c.innerHTML = `<h1>evidence/</h1>` + currentData.evidence
      .map((f) => `<button class="evfile" data-f="${esc(f)}">${esc(f)}</button>`).join('') +
      `<div id="evbody"></div>`;
    for (const btn of c.querySelectorAll('.evfile')) {
      btn.onclick = async () => {
        const r = await (await fetch(`/api/evidence?id=${encodeURIComponent(current)}&file=${encodeURIComponent(btn.dataset.f)}`)).json();
        $('#evbody').innerHTML = r.tooLarge
          ? `<p>File too large to display (${r.size} bytes) — open it on disk.</p>`
          : `<h3><code>${esc(btn.dataset.f)}</code></h3><pre>${esc(r.content)}</pre>`;
      };
    }
  }
  c.scrollTop = 0;
}

document.querySelectorAll('#tabs button').forEach((b) => b.onclick = () => {
  if (b.disabled) return;
  tab = b.dataset.tab;
  document.querySelectorAll('#tabs button').forEach((x) => x.classList.toggle('active', x === b));
  renderTab();
});
$('#q').oninput = renderList;
load();
</script>
</body>
</html>
